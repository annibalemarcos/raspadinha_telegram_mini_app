<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>{{ app_name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="/admin/dashboard">🎟️ {{ app_name }}</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div id="nav" class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/admin/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/users">Usuários</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/scratch-cards">Raspadinhas</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/invoices">Invoices</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/plays">Jogadas</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/payouts">Payouts</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/transactions">Transações</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/audit-logs">Logs</a></li>
            </ul>
            <form action="/admin/logout" method="post">
                <button class="btn btn-outline-secondary btn-sm">Sair</button>
            </form>
        </div>
    </div>
</nav>

<main class="container-fluid px-4 py-4">
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
