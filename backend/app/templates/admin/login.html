<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Login - {{ app_name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-1">🎟️ Admin</h1>
                    <p class="text-muted">Painel da raspadinha demo</p>

                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form method="post" action="/admin/login">
                        <div class="mb-3">
                            <label class="form-label">Usuário</label>
                            <input class="form-control" name="username" value="admin">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Senha</label>
                            <input class="form-control" name="password" type="password" value="admin123">
                        </div>
                        <button class="btn btn-dark w-100">Entrar</button>
                    </form>

                    <p class="small text-muted mt-3 mb-0">
                        Demo local. Dinheiro real? Só com jurídico na sala e café forte.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
